<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN" "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<busconfig>
    <type>system</type>

    # Python code has:
    # SPAM_REPORTER_SERVICE_BUS_NAME = "com.spamcop.Reporter"

	<policy user="root">
		<allow own="com.spamcop.Reporter"/>
	</policy>

	<policy context="default">
		<allow send_destination="com.spamcop.Reporter"/>
		<allow receive_sender="com.spamcop.Reporter"/>
	</policy>
</busconfig> 
